# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: Dashboard → New → Blueprint → select nifty repo
services:
  - type: web
    name: niftyoptima
    runtime: node
    rootDir: stat_react
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC
        value: "1"
      - key: MSTOCK_API_KEY
        sync: false
      - key: MSTOCK_USERNAME
        sync: false
      - key: MSTOCK_PASSWORD
        sync: false
      - key: MSTOCK_JWT_TOKEN
        sync: false
      - key: MSTOCK_TOTP_SECRET
        sync: false
      - key: MSTOCK_USE_TOTP
        value: "0"
